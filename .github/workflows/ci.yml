name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened]

# GitHub Pages 部署需要 write 权限
permissions:
  contents: write

jobs:
  # 类型检查 + 测试 + 构建
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      # ---- 第1步：拉代码 ----
      - uses: actions/checkout@v4

      # ---- 第2步：装 Node.js ----
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # 缓存 npm 依赖，第二次跑快很多
          cache: "npm"

      # ---- 第3步：装依赖 ----
      # npm ci 严格按 lock 文件装，CI 标准做法
      - run: npm ci

      # ---- 第4步：TypeScript 类型检查 ----
      # 只做类型检查不生成文件，速度更快
      - run: npx tsc --noEmit

      # ---- 第5步：运行单元测试 ----
      - run: npm test

      # ---- 第6步：生产构建 ----
      # 验证代码能成功打包
      - run: npx vite build

  # ---- 部署到 GitHub Pages ----
  deploy:
    needs: test-and-build            # CI 通过后才部署
    if: github.event_name == 'push'  # 只在 push main 时部署，PR 不部署
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npx vite build
      # 将 dist 目录推送到 gh-pages 分支
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
