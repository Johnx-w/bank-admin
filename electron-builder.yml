appId: com.bank.admin
productName: 银行后台管理系统
copyright: Copyright © 2026 Bank Admin

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*.js
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: 银行后台管理系统
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

portable:
  artifactName: ${productName}-Portable-${version}.${ext}
